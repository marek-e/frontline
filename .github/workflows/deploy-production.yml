name: Deploy (production)

on:
  push:
    tags: [ "v*" ]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # CI does not run on tags, so we replicate its checks here before deploying.
  validate:
    name: Typecheck / Lint / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  deploy:
    name: Deploy → production
    needs: [ validate ]
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Migrate DB
        working-directory: packages/db
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy web → CF Pages
        timeout-minutes: 5
        working-directory: apps/web
        run: pnpm exec wrangler pages deploy dist --project-name frontline-web
          --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api → CF Workers
        timeout-minutes: 5
        working-directory: apps/api
        run: pnpm exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy party → PartyKit
        timeout-minutes: 5
        working-directory: apps/party
        run: pnpm exec partykit deploy
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: ${{ secrets.PARTYKIT_LOGIN }}
