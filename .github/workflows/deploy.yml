name: Deploy

on:
  # For main branch: only deploy after CI passes.
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]
    branches: [ main ]
  # For production releases: tags are not covered by CI, so validate inline.
  push:
    tags: [ "v*" ]

# Never cancel an in-flight deploy.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ── Inline validation for tag pushes ─────────────────────────────────────
  # CI does not run on tags, so we replicate its checks here before deploying.
  validate:
    name: Typecheck / Lint / Test / Build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ github.event_name == 'push' && 'production' || 'staging' }})
    needs: [ validate ]
    # - workflow_run: validate is skipped, run deploy only if CI succeeded.
    # - push (tag): validate must have succeeded.
    if: |
      always() && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'push' && needs.validate.result == 'success')
      )
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run: github.sha points to the workflow file, not the triggering commit.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      # ── Staging (CI passed on main) ───────────────────────────────────────

      - name: Deploy web → CF Pages (staging)
        if: github.event_name == 'workflow_run'
        timeout-minutes: 5
        working-directory: apps/web
        run: pnpm exec wrangler pages deploy dist --project-name frontline-web
          --branch=staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api → CF Workers (staging)
        if: github.event_name == 'workflow_run'
        timeout-minutes: 5
        working-directory: apps/api
        run: pnpm exec wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy party → PartyKit (staging)
        if: github.event_name == 'workflow_run'
        timeout-minutes: 5
        working-directory: apps/party
        run: pnpm exec partykit deploy --name frontline-party-staging
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: ${{ secrets.PARTYKIT_LOGIN  }}

      # ── Production (tag v*) ───────────────────────────────────────────────

      - name: Deploy web → CF Pages (production)
        if: github.event_name == 'push'
        timeout-minutes: 5
        working-directory: apps/web
        run: pnpm exec wrangler pages deploy dist --project-name frontline-web
          --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api → CF Workers (production)
        if: github.event_name == 'push'
        timeout-minutes: 5
        working-directory: apps/api
        run: pnpm exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy party → PartyKit (production)
        if: github.event_name == 'push'
        timeout-minutes: 5
        working-directory: apps/party
        run: pnpm exec partykit deploy
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: ${{ secrets.PARTYKIT_LOGIN }}
